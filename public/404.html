<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting to CuraLink...</title>
  <script>
    // Single Page Application redirect for GitHub Pages
    // Preserve the full path so React Router can handle it
    (function() {
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;

      // Redirect to index.html while preserving path in hash
      // This allows React Router to read the path from hash and use history.replaceState
      var newPath = path.replace('/curalink', '');
      window.location.href = '/curalink/?path=' + encodeURIComponent(newPath + search + hash);
    })();
  </script>
</head>
<body>
  <p>Redirecting to <a href="/curalink/">CuraLink</a>...</p>
</body>
</html>
