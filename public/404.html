<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting to CuraLink...</title>
  <script>
    // Single Page Application redirect for GitHub Pages
    // Preserve the full path so React Router can handle it
    (function() {
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      
      // Build the full path within /curalink/ base
      // e.g., /curalink/hospital/2 -> /curalink/hospital/2
      var fullPath = path + search + hash;
      
      // Store for React to potentially use
      sessionStorage.redirect = fullPath;
      
      // Redirect to index.html with the path as a hash fragment
      // React Router with basename will handle this
      window.location.href = '/curalink/index.html' + path.replace('/curalink', '') + search + hash;
    })();
  </script>
</head>
<body>
  <p>Redirecting to <a href="/curalink/">CuraLink</a>...</p>
</body>
</html>
