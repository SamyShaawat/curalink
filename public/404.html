<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting to CuraLink...</title>
  <script>
    // Single Page Application redirect for GitHub Pages
    (function() {
      var redirect = sessionStorage.redirect;
      delete sessionStorage.redirect;
      if (redirect && redirect !== location.href) {
        history.replaceState(null, null, redirect);
      }
    })();
  </script>
  <meta http-equiv="refresh" content="0; url=/curalink/">
</head>
<body>
  <script>
    // Save the current path and redirect to index.html
    var path = window.location.pathname;
    var search = window.location.search;
    var hash = window.location.hash;
    
    // Store in sessionStorage for React Router to use
    sessionStorage.redirect = path + search + hash;
    
    // Redirect to root
    window.location.replace('/curalink/');
  </script>
  <p>Redirecting to <a href="/curalink/">CuraLink</a>...</p>
</body>
</html>
